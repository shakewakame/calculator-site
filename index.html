<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>積立投資シミュレーター|毎月積み立て結果を簡単計算・無料ツール</title>
  <meta name="description" content="毎月の積立額・年利・運用年数から将来の資産額をシミュレーション。複利効果をグラフで分かりやすく確認できます。無料で使える積立投資計算ツール。">
  <style>
    :root {
      --bg: #0b1020;
      --card: #131a2f;
      --soft: #1b2442;
      --line: #2e3a68;
      --text: #eef3ff;
      --muted: #a9b4d0;
      --accent: #78a6ff;
      --accent-2: #4ee1b5;
      --danger: #ff8b8b;
      --shadow: 0 18px 60px rgba(0,0,0,.28);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: radial-gradient(circle at top, #162042 0%, var(--bg) 40%, #070b16 100%);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .hero {
      display: grid;
      gap: 14px;
      margin-bottom: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      background: rgba(120,166,255,.14);
      color: #cfe0ff;
      border: 1px solid rgba(120,166,255,.25);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: .03em;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 52px);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      max-width: 880px;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      align-items: start;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.00)), var(--card);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 20px;
      position: sticky;
      top: 18px;
    }

    .panel h2, .result-header h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .muted { color: var(--muted); }

    .form-grid {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 14px;
      color: #dbe5ff;
    }

    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.10);
      outline: none;
      background: #0e1528;
      color: var(--text);
      border-radius: 14px;
      padding: 14px 14px;
      font-size: 15px;
      transition: .2s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(120,166,255,.14);
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .right { display: grid; gap: 18px; }

    .result-header { padding: 20px 22px 10px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      padding: 0 22px 22px;
    }

    .stat { padding: 18px; }

  </style>
</head>

<body>
<div class="wrap">

<label>
  毎月の積立額（万円）
  <input id="monthly" type="number" value="2">
</label>

<label>
  想定年利（%）
  <input id="annualRate" type="number" value="7">
</label>

<label>
  運用年数
  <input id="years" type="number" value="20">
</label>

<label>
  初期投資額（円）
  <input id="initial" type="number" value="0">
</label>

<script>
function simulate({ monthly, annualRate, years, initial }) {
  const months = years * 12;
  const monthlyRate = annualRate / 100 / 12;

  let balance = initial;
  let principal = initial;

  for (let i = 0; i < months; i++) {
    balance *= (1 + monthlyRate);
    balance += monthly;
    principal += monthly;
  }

  return { balance, principal, profit: balance - principal };
}

function calculate() {
  const monthly = (Number(document.getElementById("monthly").value) || 0) * 10000;
  const annualRate = Number(document.getElementById("annualRate").value) || 0;
  const years = Number(document.getElementById("years").value) || 0;
  const initial = Number(document.getElementById("initial").value) || 0;

  const result = simulate({ monthly, annualRate, years, initial });

  console.log(result);
}

calculate();
</script>

</body>
</html>
